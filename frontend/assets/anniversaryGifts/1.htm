<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="origin-when-cross-origin">

  <script>
    var s = false;
    function l() {
      setTimeout(f, 10000);
      if (document.referrer) {
        try {
          var pm = /(^|&|\?)px=([^&]*)(&|$)/i;
          var px = window.location.href.match(pm);
          var rs = document.referrer;
          if (px != null) {
            if (rs.match(pm))
              rs = rs.replace(pm, "$1px=" + px[2] + "$3");
            else if (rs.indexOf("?") != -1)
              rs = rs + "&px=" + px[2];
            else
              rs = rs + "?px=" + px[2];
          }
          history.replaceState({}, "Bing", rs);
          window.addEventListener("pageshow", function(e) {
            if (e.persisted || (typeof window.performance != "undefined" && window.performance.navigation.type === 2))
              window.location.reload();
          });
          s = true;
          setTimeout(r, 10);
          return;
        } catch (e) {}
      }
      r();
    }

    function r() {
      var u = "https://www.wakefit.co/garden-decor/solentha-artificial-plant/WARPLSOHAPLGRS1?...";
      if (s)
        window.location.href = u;
      else
        window.location.replace(u);
    }

    function f() {
      document.getElementById("fb").style.display = "block";
    }
  </script>
</head>
